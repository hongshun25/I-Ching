<!-- Suppressed BottomNavBar & TopAppBar as per "Semantic Shell" Mandate for Onboarding -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const carousel = document.getElementById('onboardingCarousel');
            const indicators = document.querySelectorAll('.dot-indicator');

            carousel.addEventListener('scroll', () => {
                const scrollLeft = carousel.scrollLeft;
                const width = carousel.offsetWidth;
                const activeIndex = Math.round(scrollLeft / width);

                indicators.forEach((indicator, index) => {
                    if (index === activeIndex) {
                        indicator.classList.remove('dot-inactive');
                        indicator.classList.add('dot-active');
                    } else {
                        indicator.classList.remove('dot-active');
                        indicator.classList.add('dot-inactive');
                    }
                });
            });
        });
    </script>
