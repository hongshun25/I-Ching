<style>
        @keyframes breath {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 0.9; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }
        .animate-breath {
            animation: breath 6s infinite ease-in-out;
        }
        @keyframes orbit {
            0% { transform: rotate(0deg) translateX(40px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(40px) rotate(-360deg); }
        }
        .orbit-particle {
            animation: orbit 12s linear infinite;
        }
        
        .ink-wash-circle {
            background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0) 70%);
            filter: blur(10px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col justify-between items-center px-container-margin py-stack-lg overflow-hidden select-none touch-none">
<!-- Top Section: Guidance Text -->
<header class="text-center mt-stack-lg z-10 w-full max-w-md mx-auto">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary tracking-wide mb-stack-sm opacity-90 transition-opacity duration-700" id="main-text">
            請深呼吸，將注意力放回你的問題。
        </h1>
<p class="font-body-md text-body-md text-on-surface-variant opacity-70">
            長按螢幕，直到光圈合一。
        </p>
</header>
<!-- Center Section: Immersive Interactive Area -->
<main class="flex-grow flex items-center justify-center relative w-full h-full cursor-pointer" id="interactive-area">
<!-- Background Ambient Blur -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="w-64 h-64 md:w-96 md:h-96 rounded-full ink-wash-circle opacity-50 transition-all duration-1000 ease-in-out" id="ambient-blur"></div>
</div>
<!-- Outer Breathing Circle -->
<div class="absolute w-48 h-48 md:w-64 md:h-64 rounded-full border border-outline-variant/30 animate-breath transition-all duration-1000 ease-in-out" id="outer-circle"></div>
<!-- Inner Focus Circle (The one that merges) -->
<div class="w-16 h-16 md:w-24 md:h-24 rounded-full bg-primary/10 flex items-center justify-center backdrop-blur-sm border border-primary/20 transition-all duration-1000 ease-in-out" id="inner-circle">
<span class="material-symbols-outlined text-primary/50 text-2xl" id="center-icon">
                lens_blur
            </span>
</div>
<!-- Orbital particles for a subtle meditative effect -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-40">
<div class="w-2 h-2 rounded-full bg-primary/30 orbit-particle"></div>
<div class="w-1.5 h-1.5 rounded-full bg-primary/20 orbit-particle" style="animation-delay: -4s;"></div>
<div class="w-3 h-3 rounded-full bg-primary/10 orbit-particle" style="animation-delay: -8s;"></div>
</div>
</main>
<!-- Bottom Section: Actions -->
<footer class="w-full max-w-md mx-auto text-center pb-stack-md z-10">
<button class="font-label-md text-label-md text-on-surface-variant/60 hover:text-primary transition-colors duration-300 py-unit px-gutter rounded-full border border-transparent hover:border-outline-variant/30">
            略過儀式
        </button>
</footer>
<script>
        const interactiveArea = document.getElementById('interactive-area');
        const outerCircle = document.getElementById('outer-circle');
        const innerCircle = document.getElementById('inner-circle');
        const mainText = document.getElementById('main-text');
        const ambientBlur = document.getElementById('ambient-blur');
        
        let pressTimer;
        let progress = 0;
        let isPressing = false;

        const startPress = () => {
            isPressing = true;
            outerCircle.classList.remove('animate-breath');
            mainText.style.opacity = '0.3';
            
            // Start pulling the circles together
            pressTimer = setInterval(() => {
                progress += 1;
                if (progress <= 100) {
                    // Shrink outer circle
                    const outerScale = 1 - (progress * 0.005);
                    outerCircle.style.transform = `scale(${outerScale})`;
                    outerCircle.style.borderColor = `rgba(0,0,0, ${0.1 + (progress * 0.005)})`;
                    
                    // Grow inner circle slightly and darken
                    const innerScale = 1 + (progress * 0.002);
                    innerCircle.style.transform = `scale(${innerScale})`;
                    innerCircle.style.backgroundColor = `rgba(0,0,0, ${0.1 + (progress * 0.004)})`;
                    
                    // Condense ambient blur
                    ambientBlur.style.transform = `scale(${1 - (progress * 0.003)})`;
                    ambientBlur.style.opacity = `${0.5 + (progress * 0.005)}`;
                } else {
                    // Completion state
                    clearInterval(pressTimer);
                    completeRitual();
                }
            }, 30); // ~3 seconds to complete (100 * 30ms)
        };

        const endPress = () => {
            if (!isPressing) return;
            isPressing = false;
            clearInterval(pressTimer);
            
            if (progress < 100) {
                // Reset state smoothly
                progress = 0;
                outerCircle.classList.add('animate-breath');
                outerCircle.style.transform = '';
                outerCircle.style.borderColor = '';
                
                innerCircle.style.transform = '';
                innerCircle.style.backgroundColor = '';
                
                ambientBlur.style.transform = '';
                ambientBlur.style.opacity = '';
                
                mainText.style.opacity = '0.9';
            }
        };

        const completeRitual = () => {
            mainText.innerText = "心念已達。";
            mainText.style.opacity = '1';
            
            // Final visual flourish
            innerCircle.style.transform = 'scale(1.5)';
            innerCircle.style.backgroundColor = 'rgba(0,0,0,0.8)';
            outerCircle.style.opacity = '0';
            ambientBlur.style.opacity = '0';
            
            document.getElementById('center-icon').style.color = '#fff';
            document.getElementById('center-icon').innerText = 'check';
            
            // In a real app, you would route to the next page here after a delay
            setTimeout(() => {
                console.log("Proceeding to divination result...");
            }, 1500);
        };

        // Mouse events
        interactiveArea.addEventListener('mousedown', startPress);
        window.addEventListener('mouseup', endPress);
        
        // Touch events
        interactiveArea.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Prevent scrolling while pressing
            startPress();
        }, {passive: false});
        window.addEventListener('touchend', endPress);
    </script>
