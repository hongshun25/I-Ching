<!DOCTYPE html>

<html class="light" lang="zh-Hant"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Divination - Formulate Question</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600&amp;family=Noto+Serif:wght@500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ba1a1a",
                        "on-secondary": "#ffffff",
                        "primary": "#000000",
                        "on-tertiary-fixed-variant": "#474745",
                        "surface-dim": "#dbdad9",
                        "primary-fixed": "#e5e2e1",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#e4e2e2",
                        "on-error-container": "#93000a",
                        "on-secondary-fixed": "#281800",
                        "on-error": "#ffffff",
                        "tertiary-fixed-dim": "#c8c6c4",
                        "surface-variant": "#e4e2e2",
                        "tertiary-fixed": "#e4e2df",
                        "surface-container-lowest": "#ffffff",
                        "inverse-surface": "#303031",
                        "on-secondary-fixed-variant": "#614000",
                        "primary-container": "#1c1b1b",
                        "on-secondary-container": "#795512",
                        "on-tertiary-container": "#848481",
                        "secondary": "#7c5715",
                        "on-background": "#1b1c1c",
                        "on-surface-variant": "#444748",
                        "surface-tint": "#5f5e5e",
                        "surface-bright": "#fbf9f8",
                        "primary-fixed-dim": "#c8c6c5",
                        "surface": "#fbf9f8",
                        "on-primary-fixed": "#1c1b1b",
                        "on-primary-fixed-variant": "#474746",
                        "outline": "#747878",
                        "inverse-on-surface": "#f2f0f0",
                        "secondary-container": "#ffcc7f",
                        "on-primary-container": "#858383",
                        "surface-container": "#efeded",
                        "surface-container-high": "#e9e8e7",
                        "tertiary": "#000000",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed-dim": "#f0be72",
                        "secondary-fixed": "#ffddaf",
                        "on-primary": "#ffffff",
                        "tertiary-container": "#1b1c1a",
                        "background": "#fbf9f8",
                        "surface-container-low": "#f5f3f3",
                        "outline-variant": "#c4c7c7",
                        "on-surface": "#1b1c1c",
                        "inverse-primary": "#c8c6c5",
                        "on-tertiary-fixed": "#1b1c1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "stack-lg": "48px",
                        "container-margin": "24px",
                        "stack-md": "24px",
                        "unit": "8px",
                        "stack-sm": "12px"
                    },
                    "fontFamily": {
                        "body-lg": ["Noto Sans"],
                        "headline-xl": ["Noto Serif"],
                        "headline-lg-mobile": ["Noto Serif"],
                        "label-md": ["Noto Sans"],
                        "headline-md": ["Noto Serif"],
                        "caption": ["Noto Sans"],
                        "body-md": ["Noto Sans"],
                        "headline-lg": ["Noto Serif"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "headline-xl": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "500"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "500"}],
                        "caption": ["12px", {"lineHeight": "16px", "fontWeight": "400"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "500"}]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-image: radial-gradient(circle at 50% -20%, var(--tw-colors-surface-container-low) 0%, var(--tw-colors-background) 100%);
            min-height: 100vh;
        }
        .ink-stroke {
            border-bottom: 2px solid transparent;
            border-image: linear-gradient(to right, transparent, var(--tw-colors-outline), transparent) 1;
        }
        .textarea-minimal {
            border: none;
            box-shadow: none !important;
            resize: none;
            background: transparent;
        }
        .textarea-minimal:focus {
            outline: none;
            border: none;
            box-shadow: none !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background flex flex-col items-center antialiased">
<!-- TopAppBar (Linear flow, so hiding navigation shell, but keeping a simple back/close header for context) -->
<header class="w-full flex justify-between items-center px-container-margin py-stack-md max-w-screen-xl mx-auto">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-surface-container transition-colors text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<span class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary tracking-widest">I CHING</span>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-2xl px-container-margin pt-stack-lg pb-32 flex flex-col">
<!-- Header Section -->
<div class="text-center mb-stack-lg animate-[fadeIn_0.5s_ease-out]">
<span class="font-label-md text-label-md text-secondary uppercase tracking-widest mb-unit block">Step 1</span>
<h1 class="font-headline-xl text-headline-xl text-primary mb-stack-sm">你想問什麼？</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">試著問一個你真正想理解的情境。</p>
</div>
<!-- Input Area (Bento Grid / Glassmorphism inspired) -->
<div class="bg-surface border border-outline-variant rounded-xl p-6 md:p-8 mb-stack-lg relative overflow-hidden group transition-all duration-300 hover:border-outline">
<!-- Subtle ink wash background effect -->
<div class="absolute inset-0 opacity-[0.03] bg-[radial-gradient(circle_at_top_right,_var(--tw-colors-primary),_transparent_50%)] pointer-events-none"></div>
<textarea class="textarea-minimal w-full font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant min-h-[160px]" id="questionInput" maxlength="120" oninput="updateCharCount(this)" placeholder="我目前在工作上最需要調整的是什麼？"></textarea>
<div class="flex justify-end mt-4">
<span class="font-caption text-caption text-on-surface-variant" id="charCount">0 / 120</span>
</div>
<div class="absolute bottom-0 left-8 right-8 h-px bg-gradient-to-r from-transparent via-outline-variant to-transparent opacity-50"></div>
</div>
<!-- Shortcuts Section -->
<div class="mb-stack-lg">
<p class="font-label-md text-label-md text-on-surface-variant mb-4 text-center">或選擇常見主題</p>
<div class="flex flex-wrap justify-center gap-3">
<!-- Chips -->
<button class="px-5 py-2 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md text-body-md hover:bg-surface-container hover:text-primary transition-all active:scale-95" onclick="setQuestion('職涯發展的方向')">職涯</button>
<button class="px-5 py-2 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md text-body-md hover:bg-surface-container hover:text-primary transition-all active:scale-95" onclick="setQuestion('這段感情未來的發展')">感情</button>
<button class="px-5 py-2 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md text-body-md hover:bg-surface-container hover:text-primary transition-all active:scale-95" onclick="setQuestion('如何改善當前的人際關係')">人際</button>
<button class="px-5 py-2 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md text-body-md hover:bg-surface-container hover:text-primary transition-all active:scale-95" onclick="setQuestion('近期的財務狀況與建議')">財務</button>
<button class="px-5 py-2 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md text-body-md hover:bg-surface-container hover:text-primary transition-all active:scale-95" onclick="setQuestion('學業上的挑戰與突破')">學業</button>
<button class="px-5 py-2 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md text-body-md hover:bg-surface-container hover:text-primary transition-all active:scale-95" onclick="setQuestion('家庭關係的調和')">家庭</button>
<button class="px-5 py-2 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md text-body-md hover:bg-surface-container hover:text-primary transition-all active:scale-95" onclick="setQuestion('健康狀態的保養建議')">健康</button>
<button class="px-5 py-2 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md text-body-md hover:bg-surface-container hover:text-primary transition-all active:scale-95" onclick="setQuestion('面對這個選擇，我該如何決定')">決策</button>
<button class="px-5 py-2 rounded-full border border-outline-variant bg-surface-container-lowest text-on-surface-variant font-body-md text-body-md hover:bg-surface-container hover:text-primary transition-all active:scale-95" onclick="setQuestion('近期自我成長的重點')">自我成長</button>
</div>
</div>
<!-- Spacer to push CTA to bottom if needed on larger screens -->
<div class="flex-1"></div>
<!-- Primary CTA -->
<div class="mt-stack-lg flex justify-center">
<button class="w-full md:w-auto px-12 py-4 bg-primary text-on-primary rounded-full font-label-md text-label-md tracking-widest hover:opacity-90 active:scale-95 transition-all shadow-sm flex items-center justify-center gap-2">
                確認提問
                <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</main>
<script>
        function updateCharCount(textarea) {
            const count = textarea.value.length;
            document.getElementById('charCount').textContent = `${count} / 120`;
            
            // Optional: Auto-resize textarea logic could go here if needed
        }

        function setQuestion(text) {
            const input = document.getElementById('questionInput');
            input.value = text;
            updateCharCount(input);
            input.focus();
        }
    </script>
</body></html>
