<style>
        /* Subtle ink wash/rice paper texture effect */
        .rice-paper-bg {
            background-color: #FBF9F6;
            position: relative;
        }
        .rice-paper-bg::before {
            content: "";
            position: absolute;
            inset: 0;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }
        
        /* Fade in animation */
        .fade-in {
            opacity: 0;
            animation: fadeIn 2s ease-in-out forwards;
        }
        
        .delay-1000 {
            animation-delay: 1s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Minimalist hexagram styling */
        .hexagram-line {
            width: 80px;
            height: 6px;
            background-color: #1c1b1b;
            margin-bottom: 8px;
            border-radius: 1px;
        }
        .hexagram-line.broken {
            background: transparent;
            position: relative;
        }
        .hexagram-line.broken::before,
        .hexagram-line.broken::after {
            content: '';
            position: absolute;
            top: 0;
            width: 35px;
            height: 100%;
            background-color: #1c1b1b;
            border-radius: 1px;
        }
        .hexagram-line.broken::before { left: 0; }
        .hexagram-line.broken::after { right: 0; }
    </style>
