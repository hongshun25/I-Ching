<header class="bg-background/80 backdrop-blur-md flex justify-between items-center w-full px-container-margin py-stack-md docked full-width top-0 z-40 sticky top-0">
<button aria-label="Menu" class="text-primary hover:opacity-70 transition-opacity active:scale-95 transition-transform duration-200 p-2 rounded-full hover:bg-surface-container-high transition-colors">

</div>
<div class="relative z-10 flex flex-col items-center text-center max-w-md w-full">

<span class="material-symbols-outlined text-[64px] text-primary/20 relative z-10 font-light" style="font-variation-settings: 'wght' 100;">
                    history_edu
                </span>
</div>

            </p>
<!-- CTA -->
<button class="bg-primary text-on-primary font-label-md text-label-md px-8 py-4 rounded-full hover:bg-primary/90 transition-all duration-300 active:scale-95 shadow-sm hover:shadow flex items-center gap-2">
